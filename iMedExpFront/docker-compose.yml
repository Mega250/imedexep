services:
  imedexp-front:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run start:lan
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
      NPM_CONFIG_CACHE: /npm-cache
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - imedexp_front_node_modules:/app/node_modules
      - imedexp_front_npm_cache:/npm-cache
    stdin_open: true
    tty: true

volumes:
  imedexp_front_node_modules:
  imedexp_front_npm_cache:
