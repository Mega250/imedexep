services:
  imedexp-front-android:
    build:
      context: .
      dockerfile: Dockerfile.android
    working_dir: /app
    command: npm run typecheck
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_BASE_URL: http://host.docker.internal:8000
      NPM_CONFIG_CACHE: /npm-cache
    volumes:
      - .:/app
      - imedexp_front_node_modules:/app/node_modules
      - imedexp_front_npm_cache:/npm-cache
    stdin_open: true
    tty: true

volumes:
  imedexp_front_node_modules:
  imedexp_front_npm_cache:
