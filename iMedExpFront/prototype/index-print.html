<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>imedexp · print</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="tokens.css" />

  <style>
    html, body { margin: 0; padding: 0; background: #E3DCC9; font-family: 'Geist', system-ui, sans-serif; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    .print-stack { display: flex; flex-direction: column; gap: 40px; padding: 40px; }
    .print-page {
      background: var(--paper); break-inside: avoid;
      box-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 12px 30px rgba(0,0,0,0.08);
    }
    .print-page > div { display: block; }

    /* Named pages — each screen prints at its native dimensions, no scale. */
    @page home    { size: 1440px 2880px; margin: 0; }
    @page wide    { size: 1440px 980px;  margin: 0; }
    @page wideShort { size: 1440px 900px; margin: 0; }
    @page phone   { size: 460px 920px;   margin: 0; }

    .pg-home    { page: home;    break-after: page; }
    .pg-login   { page: wideShort; break-after: page; }
    .pg-doctor  { page: wide;    break-after: page; }
    .pg-patient { page: phone;   break-after: page; }

    @media print {
      html, body { background: #fff; }
      .print-stack { display: block; gap: 0; padding: 0; }
      .print-page { box-shadow: none; }
      .screen-caption { display: none !important; }
    }

    .screen-caption {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: 0.08em; color: #6B665E;
      text-transform: uppercase; padding: 0 4px 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="screen-home.jsx"></script>
  <script type="text/babel" src="screen-login.jsx"></script>
  <script type="text/babel" src="screen-doctor.jsx"></script>
  <script type="text/babel" src="screen-patient.jsx"></script>

  <script type="text/babel">
    function PrintApp() {
      return (
        <div className="print-stack">
          <div className="screen-caption">A · home / landing — 1440 × 2880</div>
          <div className="print-page pg-home"><window.HomeScreen /></div>

          <div className="screen-caption">B · login / acceso — 1440 × 900</div>
          <div className="print-page pg-login"><window.LoginScreen /></div>

          <div className="screen-caption">C · consola del médico — 1440 × 980</div>
          <div className="print-page pg-doctor"><window.DoctorScreen /></div>

          <div className="screen-caption">D · app del paciente (iOS) — 460 × 920</div>
          <div className="print-page pg-patient" style={{ padding: '20px', display: 'flex', justifyContent: 'center' }}>
            <window.PatientScreen />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

    // Auto-print once fonts + render settle
    (async () => {
      try { if (document.fonts && document.fonts.ready) { await document.fonts.ready; } } catch (e) {}
      await new Promise((r) => setTimeout(r, 800));
      window.print();
    })();
  </script>
</body>
</html>
